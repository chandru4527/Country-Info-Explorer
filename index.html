<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Info UI</title>

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-black via-blue-900 to-black text-white flex flex-col items-center justify-start p-6">

    <h1 class="text-3xl font-extrabold text-center mb-8 flex items-center justify-center gap-3
           bg-gradient-to-r from-blue-400 via-cyan-400 to-blue-600 
           bg-clip-text text-transparent drop-shadow-lg">

        <i class="ri-earth-line text-blue-400 text-4xl"></i>
        Country Finder
    </h1>

    <!-- Search -->
    <div class="w-full max-w-md mb-10">
        <input id="searchInput" type="text" placeholder="🔍 Search for a country..." class="w-full p-4 rounded-xl bg-white/10 backdrop-blur-md 
             border border-blue-500/30 
             focus:border-blue-400 focus:ring-2 focus:ring-blue-500/40
             outline-none transition duration-300 
             placeholder-gray-300" />
    </div>

    <!-- Result Container -->
    <div id="countriesContainer" class="w-full flex justify-center"></div>

    <script>
        const container = document.getElementById("countriesContainer");
        const searchInput = document.getElementById("searchInput");

        const searchCountry = async (name) => {
            if (!name) {
                container.innerHTML = "";
                return;
            }

            container.innerHTML = "<p class='text-center'>Searching...</p>";

            try {
                const res = await fetch(`https://restcountries.com/v3.1/name/${name}`);

                if (!res.ok) throw new Error("Country not found");

                const data = await res.json();
                const country = data[0]; // take first match

                container.innerHTML = `
                         <div class="bg-white/10 backdrop-blur-lg border border-white/20 
              p-6 rounded-2xl shadow-xl max-w-md w-full text-center
              hover:scale-105 hover:shadow-blue-500/30 transition duration-300">

                 <img 
                     src="${country.flags?.svg || country.flags?.png}" 
                        alt="${country.name.common} flag"
                        loading="lazy"
                        class="w-full h-48 object-contain bg-black/30 rounded-xl mb-4 border border-white/20 p-2"/>

                    <h2 class="text-3xl font-bold mb-3 
                         bg-gradient-to-r from-blue-400 to-cyan-400 
                           bg-clip-text text-transparent">
                         ${country.name.common}
                     </h2>

                <div class="space-y-3 text-gray-200 text-sm text-left">

                            <p class="flex items-center gap-2">
                              <i class="ri-building-line text-blue-400"></i>
                              <span class="text-white font-semibold">Capital:</span>
                              ${country.capital?.[0] || "N/A"}
                            </p>
                        
                            <p class="flex items-center gap-2">
                              <i class="ri-earth-line text-green-400"></i>
                              <span class="text-white font-semibold">Region:</span>
                              ${country.region}
                            </p>
                        
                            <p class="flex items-center gap-2">
                              <i class="ri-group-line text-purple-400"></i>
                              <span class="text-white font-semibold">Population:</span>
                              ${country.population.toLocaleString()}
                            </p>
                        
                            <p class="flex items-center gap-2">
                              <i class="ri-money-dollar-circle-line text-yellow-400"></i>
                              <span class="text-white font-semibold">Currency:</span>
                              ${Object.values(country.currencies || {})[0]?.name || "N/A"}
                            </p>
                        
                            <p class="flex items-center gap-2">
                              <i class="ri-translate-2 text-cyan-400"></i>
                              <span class="text-white font-semibold">Language:</span>
                              ${Object.values(country.languages || {}).join(", ") || "N/A"}
                            </p>

                        </div>

                </div>
                `;


            } catch (error) {
                container.innerHTML = "<p class='text-center text-red-500'>Country not found</p>";
            }
        }

        // Trigger search on typing
        let timeout;
        searchInput.addEventListener("input", () => {
            clearTimeout(timeout);

            timeout = setTimeout(() => {
                searchCountry(searchInput.value.trim());
            }, 500); // debounce
        });

        searchInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                searchCountry(searchInput.value.trim(), true);
            }
        });
    </script>

</body>

</html>
